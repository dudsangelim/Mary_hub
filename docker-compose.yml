services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: mary_edu
      POSTGRES_USER: mary
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "55433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mary -d mary_edu"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6381:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+asyncpg://mary:${POSTGRES_PASSWORD}@postgres:5432/mary_edu
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: ${JWT_ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      JWT_REFRESH_TOKEN_EXPIRE_DAYS: ${JWT_REFRESH_TOKEN_EXPIRE_DAYS:-7}
      UPLOAD_DIR: /app/uploads
      UPLOAD_MAX_SIZE_MB: ${UPLOAD_MAX_SIZE_MB:-20}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3100}
      OPENCLAW_INGEST_SECRET: ${OPENCLAW_INGEST_SECRET}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-anthropic/claude-haiku-4-5}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_TTS_MODEL: ${OPENAI_TTS_MODEL:-tts-1}
      OPENAI_TTS_VOICE: ${OPENAI_TTS_VOICE:-nova}
      TUTOR_LUCAS_MODEL: ${TUTOR_LUCAS_MODEL:-openai/gpt-4o-mini}
      SCRAPING_SERVICE_URL: ${SCRAPING_SERVICE_URL:-http://172.17.0.1:3002}
    volumes:
      - ./backend:/app
      - uploads:/app/uploads
    ports:
      - "8100:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head &&
             python -m app.seed &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  frontend:
    build: ./frontend
    environment:
      NEXT_PUBLIC_API_URL: /api/v1
      INTERNAL_API_ORIGIN: http://backend:8000
    ports:
      - "3100:3000"
    depends_on:
      - backend

volumes:
  pgdata:
  uploads:
